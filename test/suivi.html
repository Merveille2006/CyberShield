<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Suivre mon affaire - CyberShield</title>
  <link rel="stylesheet" href="test.css" />
</head>
<body class="page-interne">

  <header id="en-tete">
    <div class="contenu-en-tete">
      <nav id="navigation-principale">
        <a href="test.html" class="lien-nav">← Retour à l'accueil</a>
      </nav>
    </div>
  </header>

  <main class="conteneur-principal">
    <section id="section-suivi">
      <div class="entete-section">
        <h2 class="titre-section">Suivi de dossier</h2>
      </div>
      <div class="conteneur-suivi">
        <form id="formulaire-suivi">
          <div class="groupe-saisie">
            <label>Entrez votre code de suivi (Ex: CS-2026-XXXX) :</label>
            <input type="text" id="code-recherche" required>
          </div>
          <button type="submit" class="btn-principal">Vérifier l'état</button>
        </form>
        <div id="resultat-suivi" class="cache"></div>
      </div>
    </section>
  </main>

  <script src="test.js"></script>
</body>
</html>
