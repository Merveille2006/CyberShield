<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion Enquêteur - CyberShield</title>
  <link rel="stylesheet" href="test.css" />
</head>
<body class="page-connexion">

  <div class="boite-connexion">
    <a href="test.html" class="lien-retour">← Retour</a>
    <h2>Accès Brigade</h2>
    <p>Authentification requise</p>
    
    <form action="dashboard.html" method="GET">
      <div class="groupe-saisie">
        <label>Nom :</label>
        <input type="text" required>
      </div>
      <div class="groupe-saisie">
        <label>Prénom :</label>
        <input type="text" required>
      </div>
      <div class="groupe-saisie">
        <label>Email :</label>
        <input type="email" required>
      </div>
      <div class="groupe-saisie">
        <label>Matricule Enquêteur :</label>
        <input type="text" placeholder="Ex: BCI-XXXX" required>
      </div>
      <div class="groupe-saisie">
        <label>Mot de passe :</label>
        <input type="password" required>
      </div>
      <button type="submit" class="btn-principal plein-largeur">Se connecter</button>
    </form>
  </div>

</body>
</html>
