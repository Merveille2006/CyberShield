<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield - Authentification Brigade</title>
    <link rel="stylesheet" href="cyber.css">
</head>
<body>
    <header>
        <a href="cyber.html" class="logo">Cyber<span>Shield</span></a>
        <nav>
            <a href="cyber.html">Accueil</a>
            <a href="signalement.html">Signaler une fraude</a>
            <a href="suivi.html">Suivre un dossier</a>
            <a href="connexion.html" class="active">Espace Brigade</a>
        </nav>
    </header>

    <div class="container" style="max-width: 500px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Connexion Interne / Brigade</h2>
            
            <form id="form-login">
                <div style="display: flex; gap: 0.5rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="input-prenom">Prénom</label>
                        <input type="text" id="input-prenom" placeholder="Officier">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="input-nom">Nom</label>
                        <input type="text" id="input-nom" placeholder="Mvouama">
                    </div>
                </div>

                <div class="form-group">
                    <label for="input-matricule">Matricule Professionnel</label>
                    <input type="text" id="input-matricule" placeholder="CH-2026-X">
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border); margin: 1rem 0;">

        
                <div class="form-group">
                    <label for="input-email">Adresse Email Pro *</label>
                    <input type="email" id="input-email" value="justice@cybershield.cg" required>
                </div>

                <div class="form-group">
                    <label for="input-password">Mot de passe sécurisé *</label>
                    <input type="password" id="input-password" placeholder="••••••••" required>
                </div>

                <div id="error-login" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none; font-weight: 500;">
                     Identifiants ou matricule incorrects.
                </div>

                <button type="submit" class="btn" style="width: 100%;">Se connecter au Workspace</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:4000/api';

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error-login');
            errorDiv.style.display = 'none';

            const payload = {
                email: document.getElementById('input-email').value,
                mot_de_passe: document.getElementById('input-password').value
            };

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    
                    localStorage.setItem('token_cybershield', result.token);
                    localStorage.setItem('user_name', result.enqueteur.nom);
                    localStorage.setItem('user_role', result.enqueteur.role);
                    
                    
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = `${result.message || 'Identifiants incorrects'}`;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                errorDiv.textContent = "Impossible de joindre l'authentificateur local (Port 4000).";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
